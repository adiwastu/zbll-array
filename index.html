  <script>

    /* ============================================================
       DISPATCH TABLE (also called a "lookup table")
       Instead of a giant if/else checking which set is active,
       we store every set's algs in a plain object keyed by set
       name. Then we just do ALGS[selectedSet][row][col] to get
       the right alg instantly. Adding a new set = adding one
       object. No if/else needed ever.

       Structure: ALGS[setName][rowName][colIndex]
       rowName matches the data-case attribute on each <th>.
       colIndex is 0-11, matching the 12 BH columns left→right.

       The placeholder string "R U R' U' (update this)" is what
       shows for any cell that hasn't been filled in yet.
    ============================================================ */
    var PLACEHOLDER = "R U R' U' (update this)";

    /* Helper: fills an entire row with the placeholder.
       This uses Array.from({length: N}, fn) — a pattern for
       generating an array of N items using a mapping function. */
    function placeholderRow() {
      return Array.from({ length: 12 }, function() { return PLACEHOLDER; });
    }

    var ALGS = {
      u: {
        "2gll": [
          "R U R' U R U' R' U' R U' R' U2 R U' R' U2 R U R'",
          "R U R' U' R' U R U R U' R' U R' U R U2 R' U' R",
          "R' U' R U' R' U2 R2 U R' U R U2 R'",
          "(U2) R U R' U R U2 R2 U' R U' R' U2 R",
          "(U') R U R' U' R U' R' U2 R U' R' U2 R U R'",
          "(U2) R U R' U R U2 R' U R U2 R' U' R U' R'",
          "(U) R' U2 R U R' U R U R' U' R U' R' U2 R",
          "(U) R U2 R2 U' R2 U' R' U R' U' R U R' U R",
          "(U) R U2 R' U' R U' R' U' R U R' U R U2 R'",
          "R' U' R U' R U2 R2 U' R2 U' R2 U R",
          "(U2) R U R' U R' U2 R2 U R2 U R2 U' R'",
          "(U) R' U2 R2 U R2 U R U' R U R' U' R U' R'"
        ],
        "diag": [
          "(U2) L' R U R' U R U R' U2 L R U' R'",
          "R U' R' U' R U R D R' U R D' R2",
          "(U') f U R U' R' f' r' U r2 U' r2' U' r2 U r'",
          "R D' R2 U2 R U' R' U' R2 D R'",
          "(U2) R D' R2 U R U R' U2 R2 D R'",
          "(U') R U2' R2' F R F' U' S' R U' R' S",
          "(U') R' D' R U' R' D R2 U2 R' U R U R'",
          "(U') R' U' F R' F' R2 S' R' U R S",
          "F U R U2 R' U R U R' U R U2 R' U R U R' F'",
          "(U') r U' r2 U r2 U r2 U' r f R U R' U' f'",
          "R' F' U' F U F R S R' F' R S'",
          "S' R' U' R S R' U F' U' F U R"
        ],
        "x": [
          "(U2) r U2 r' U2 L' U2 r U2 r' U2 L",
          "R' D' U2 R' D R U2 R' D' R D R",
          "(U2) R U' R2 F R U R U' R2 F' R U' F' U F",
          "R' U' R f R' U R U' R U R' U' f'",
          "R U R' U R U' R' U2 R' D' R U2 R' D R2 U' R'",
          "(U') R U' R' U' R U' R' U R' D' R U R' D R2 U R'",
          "R' U2 R U R D R' U' R D' R' U R' U R",
          "R U R' U' R' F2 r2 U' R' U' R U R r2 F2",
          "(U2) R U R' U R U R' U2 R U' R2 D' R U' R' D R",
          "R' U' R F U' R' U' R U F' U R' U R",
          "R F U' R' U' R U2 R' U' R F' R'",
          "(U2) S R U2 R' F R' F' R U2 R' F R f'"
        ],
        "bars": [
          "R' F R U' R' U' R U R' F' R U R' U' R' F R F' R",
          "R2 F R U R U' R' F' R U' R2' D' R U R' D R2",
          "R F U R' U' R F' R' U' R' F R f' R U R' S",
          "(U') F' U' r' F2 r U' r' F' r2 U R' U' r' F R",
          "(U') F2 R U' R' U' R U R' F' R U R' U' R' F R F2",
          "S R' F2 R S' R' U' F U r U2' R U' r' F",
          "r2 F2 r U2 r U' L' U R' U R U' L",
          "z R D R2' U' R D' U R' D R2' U' R D' R U",
          "(U') R' U' R F R2' D' R U R' D R2 U' F'",
          "S' R' F' U2 F R U2 R' F R' F' R2 S",
          "(U') r U R' U' r' F R U R' U' R F' R' U R",
          "(U') r U R' U' r' F R2 U' R' U' R U2 R' U' F'"
        ],
        "slash": [
          "(U2) R2 D R' U2 R D' R' U2 R'",
          "r U R' U R' D' R U R' D R U r' F R F'",
          "(U2) R' D' r U2 r' D R U2 R U' R' U' R U' R'",
          "back sexy front sexy R' U F R horrid F' (harrison notation)",
          "(U') R U R' U R U' R' U F' R U2 R' U2 R' F R",
          "(U) R U R' U R U' R' U' R' F R U R U' R' F'",
          "(U2) R2 D r' U2 r D' R' U2 R'",
          "(U2) R' U' F' R U R2 U' R' F R U R2 U2 R' U2 R",
          "R F2 U' R2 U' R U2 R' U' R U' R U F2 R'",
          "(U) R U R' U R U' R' U R U' R' U' L' U R U' R' L",
          "R U' R' U' R U2 R' U' R' D' R U2 R' D R",
          "(U') R U2 R D R' U2 R D' R' U2 R' U' R U' R'"
        ],
        "backslash": [
          "R2 D' r U2 r' D R U2 R",
          "F U R U' R D R' U' R D' R2 U R U R' F'",
          "(U') R' U2 R' D' R U2 R' D R U2 R U R' U R",
          "(U') R2' F' R U2 R U2 R' F U' R U R' U' R",
          "r B r' U r B2 r2 F R F' r U R'",
          "R' F R U' R' F R U R' F R U' R' F2 R F U F'",
          "(U) R2 D' R U' R' D R2 U' R' U2 R",
          "R D r' U2 r D' R' U2 R' U R U R' U R",
          "R' F' r U2 R' D R U' R' D' R2 U' r' F",
          "(U') L U2 R' F R U' R U R' U F' R U2 R' L'",
          "R2 D' R U2 R' D R U2 R",
          "R D R' U2 R D' R' U R' U R U' R' U' R U R' U' R"
        ]
      },

      /* T set: all placeholders until you fill them in */
      t: {
        "2gll":      placeholderRow(),
        "diag":      placeholderRow(),
        "x":         placeholderRow(),
        "bars":      placeholderRow(),
        "slash":     placeholderRow(),
        "backslash": placeholderRow()
      }

      /* To add L, Pi, H, S, A: follow the same pattern.
         Either fill real algs or use placeholderRow(). */
    };


    /* ============================================================
       UTILITY: placeholder factory function
       A factory function creates and returns a new DOM element.
    ============================================================ */
    function createPlaceholder(filename) {
      var wrapper = document.createElement("div");
      wrapper.className = "img-placeholder";
      wrapper.title = "Missing file: " + filename;

      var icon = document.createElement("span");
      icon.className = "placeholder-icon";
      icon.textContent = "⚠️";

      var label = document.createElement("span");
      label.className = "placeholder-label";
      label.textContent = filename;

      wrapper.appendChild(icon);
      wrapper.appendChild(label);
      return wrapper;
    }

    /* ============================================================
       UTILITY: safe image loader (graceful degradation)
       Attaches onerror BEFORE setting src.
    ============================================================ */
    function attachErrorHandler(img) {
      img.addEventListener("error", function() {
        var filename = img.src.split("/").pop().split("\\").pop();
        var placeholder = createPlaceholder(filename);
        img.parentNode.replaceChild(placeholder, img);
      });
    }

    Array.from(document.querySelectorAll("img")).forEach(attachErrorHandler);


    /* ============================================================
       SET SWAPPER — images + algs
    ============================================================ */
    var setSelector = document.getElementById("set-selector");

    function swapSets() {
      var selectedSet = setSelector.value;

      /* --- Swap row-header images --- */
      var rowHeaders = document.querySelectorAll("th[data-case]");
      rowHeaders.forEach(function(th) {
        var caseName = th.getAttribute("data-case");
        var newSrc   = "./" + selectedSet + "-coll-" + caseName + ".png";
        var newAlt   = selectedSet.toUpperCase() + " " + caseName;
        var existing = th.querySelector("img, .img-placeholder");

        if (existing && existing.tagName === "IMG") {
          existing.src = newSrc;
          existing.alt = newAlt;
          attachErrorHandler(existing);
        } else {
          var newImg    = document.createElement("img");
          newImg.alt    = newAlt;
          newImg.border = "0";
          newImg.height = 80;
          newImg.width  = 80;
          attachErrorHandler(newImg);
          newImg.src = newSrc;
          if (existing) {
            th.replaceChild(newImg, existing);
          } else {
            th.appendChild(newImg);
          }
        }
      });

      /* --- Swap button algs ---
         We walk every data-case row, grab the matching alg array
         from the dispatch table, then assign each alg to the
         matching button by column index.

         This uses the "parallel arrays" concept: the buttons in
         a row and the algs array share the same index, so
         buttons[0] always gets algs[0], buttons[1] gets algs[1],
         etc. */
      rowHeaders.forEach(function(th) {
        var caseName  = th.getAttribute("data-case");
        var setAlgs   = ALGS[selectedSet];

        /* Fallback: if the whole set isn't in the table yet,
           treat every cell as a placeholder. This is the
           "null object pattern" — return a safe default
           instead of crashing with undefined[caseName]. */
        var rowAlgs = (setAlgs && setAlgs[caseName])
          ? setAlgs[caseName]
          : placeholderRow();

        var row     = th.parentElement;          /* the <tr> */
        var cells   = row.querySelectorAll("td");

        cells.forEach(function(td, colIndex) {
          var btn = td.querySelector(".editbtn");
          if (btn) {
            var alg = rowAlgs[colIndex] !== undefined
              ? rowAlgs[colIndex]
              : PLACEHOLDER;
            btn.setAttribute("data-alg", alg);
          }
        });
      });

      /* Clear the display so stale algs from the old set
         don't linger after switching. */
      textDisplay.innerHTML = "Click 👀 to see the algorithm.";
      Array.from(buttons).forEach(function(b) { b.classList.remove("active"); });
    }

    setSelector.addEventListener("change", swapSets);
    swapSets();


    /* ============================================================
       ALGORITHM DISPLAY
    ============================================================ */
    var audio       = document.getElementById("chess_audio");
    var buttons     = document.getElementsByClassName("editbtn");
    var textDisplay = document.createElement("div");

    textDisplay.style.cssText = "font-size:30px; font-weight:bold; position:fixed; bottom:16px; left:16px; color:blue; background:rgba(255,255,255,0.92); padding:8px 12px; border-radius:6px; border:1px solid #ccc; max-width:90vw;";
    textDisplay.id = "text-display";
    textDisplay.innerHTML = "Click 👀 to see the algorithm.";
    document.body.appendChild(textDisplay);

    Array.from(buttons).forEach(function(btn) {
      btn.addEventListener("click", function() {
        audio.play();
        textDisplay.innerHTML = this.getAttribute("data-alg");

        Array.from(buttons).forEach(function(b) { b.classList.remove("active"); });
        this.classList.add("active");
      });
    });


    /* ============================================================
       COPY BUTTON
    ============================================================ */
    var copyButton    = document.getElementById("copy-button");
    var copiedMessage = document.getElementById("copied-message");

    copyButton.addEventListener("click", function() {
      var text     = textDisplay.innerHTML;
      var textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);

      copiedMessage.style.display = "block";
      setTimeout(function() { copiedMessage.style.display = "none"; }, 1500);
    });

  </script>
