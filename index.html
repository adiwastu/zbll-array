  <script>

    /* ---------- UTILITY: placeholder factory function ----------
       A factory function creates and returns a new DOM element.
       We centralise the placeholder design here so if you want
       to change the look, you only edit one place. */
    function createPlaceholder(filename) {
      var wrapper = document.createElement("div");
      wrapper.className = "img-placeholder";
      wrapper.title = "Missing file: " + filename;

      var icon = document.createElement("span");
      icon.className = "placeholder-icon";
      icon.textContent = "⚠️";

      var label = document.createElement("span");
      label.className = "placeholder-label";
      label.textContent = filename;

      wrapper.appendChild(icon);
      wrapper.appendChild(label);
      return wrapper;
    }

    /* ---------- UTILITY: safe image loader ----------
       Attaches an onerror handler BEFORE setting src so the
       browser fires the event even if the file is missing on
       first load. Replaces the broken <img> with a placeholder
       div in the DOM. This is called "graceful degradation". */
    function attachErrorHandler(img) {
      img.addEventListener("error", function() {
        var filename = img.src.split("/").pop().split("\\").pop();
        var placeholder = createPlaceholder(filename);
        img.parentNode.replaceChild(placeholder, img);
      });
    }

    /* Attach error handlers to all images already in the page on load.
       querySelectorAll returns a NodeList — we spread it into an Array
       so we can use forEach, which NodeLists don't always support. */
    Array.from(document.querySelectorAll("img")).forEach(attachErrorHandler);


    /* ---------- SET SWAPPER ----------
       When the user picks a different set, we find every row-header <th>
       that has a data-case attribute and rebuild the image src using the
       selected set prefix + the case name.

       This is the "data attribute as single source of truth" pattern:
       the HTML stores the *identity* (e.g. "2gll"), the JS derives the
       *filename* dynamically, so the two never drift out of sync. */
    var setSelector = document.getElementById("set-selector");

    function swapSets() {
      var selectedSet = setSelector.value;   // already lowercase from the <option> values

      /* CSS attribute selector: [data-case] matches any element
         that has a data-case attribute, regardless of its value. */
      var rowHeaders = document.querySelectorAll("th[data-case]");

      rowHeaders.forEach(function(th) {
        var caseName   = th.getAttribute("data-case");
        var newSrc     = "./" + selectedSet + "-coll-" + caseName + ".png";
        var newAlt     = selectedSet.toUpperCase() + " " + caseName;

        /* Check if the slot currently holds an <img> or a placeholder div.
           This is a "defensive check" — we handle both states so switching
           sets twice in a row doesn't crash. */
        var existing = th.querySelector("img, .img-placeholder");

        if (existing && existing.tagName === "IMG") {
          existing.src = newSrc;
          existing.alt = newAlt;
          /* Re-attach the error handler every time src changes,
             because reassigning src fires the load cycle again. */
          attachErrorHandler(existing);
        } else {
          /* Replace placeholder with a fresh <img>.
             If the new file also missing, onerror will swap it back. */
          var newImg = document.createElement("img");
          newImg.alt    = newAlt;
          newImg.border = "0";
          newImg.height = 80;
          newImg.width  = 80;
          attachErrorHandler(newImg);   /* attach BEFORE setting src */
          newImg.src = newSrc;
          if (existing) {
            th.replaceChild(newImg, existing);
          } else {
            th.appendChild(newImg);
          }
        }
      });
    }

    setSelector.addEventListener("change", swapSets);


    /* ---------- ALGORITHM DISPLAY ---------- */
    var audio      = document.getElementById("chess_audio");
    var buttons    = document.getElementsByClassName("editbtn");
    var textDisplay = document.createElement("div");

    textDisplay.style.cssText = "font-size:30px; font-weight:bold; position:fixed; bottom:16px; left:16px; color:blue; background:rgba(255,255,255,0.92); padding:8px 12px; border-radius:6px; border:1px solid #ccc; max-width:90vw;";
    textDisplay.id = "text-display";
    textDisplay.innerHTML = "Click 👀 to see the algorithm.";
    document.body.appendChild(textDisplay);

    Array.from(buttons).forEach(function(btn) {
      btn.addEventListener("click", function() {
        audio.play();
        textDisplay.innerHTML = this.getAttribute("data-alg");

        Array.from(buttons).forEach(function(b) { b.classList.remove("active"); });
        this.classList.add("active");
      });
    });


    /* ---------- COPY BUTTON ---------- */
    var copyButton    = document.getElementById("copy-button");
    var copiedMessage = document.getElementById("copied-message");

    copyButton.addEventListener("click", function() {
      var text     = textDisplay.innerHTML;
      var textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);

      copiedMessage.style.display = "block";
      setTimeout(function() { copiedMessage.style.display = "none"; }, 1500);
    });

  </script>
